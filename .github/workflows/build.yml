name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      
      - name: Build
        run: python -m PyInstaller --clean 2233TicketBuy.spec
      
      - name: Rename (add platform suffix)
        shell: pwsh
        run: |
          $f = Get-ChildItem dist/*.exe | Select-Object -First 1
          $new = $f.BaseName + '_Windows' + $f.Extension
          Rename-Item $f.FullName $new
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 2233TicketBuy_Windows
          path: dist/2233TicketBuy_*_Windows.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller
      
      - name: Build
        run: python -m PyInstaller --clean 2233TicketBuy.spec
      
      - name: Rename (add platform suffix)
        run: |
          f=$(ls dist/2233TicketBuy_v* | head -1)
          mv "$f" "${f}_Linux"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 2233TicketBuy_Linux
          path: dist/2233TicketBuy_v*_Linux

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: 2233TicketBuy_Windows
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: 2233TicketBuy_Linux
          path: dist/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
